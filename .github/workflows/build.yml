name: Build on demand

on:
  workflow_dispatch:
    inputs:
      platform:
        description: Platform to build
        required: true
        default: macOS
        type: choice
        options:
          - macOS
          - Linux
          - Windows
          - All

permissions:
  contents: read

jobs:
  build-macos:
    name: Build macOS
    if: ${{ github.event.inputs.platform == 'macOS' || github.event.inputs.platform == 'All' }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npm run release:mac-universal
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - uses: actions/upload-artifact@v4
        with:
          name: macOS-artifacts
          path: |
            dist/*.dmg
            dist/latest-mac.yml
          if-no-files-found: warn
          retention-days: 7

  build-linux:
    name: Build Linux
    if: ${{ github.event.inputs.platform == 'Linux' || github.event.inputs.platform == 'All' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npm run release:linux

      - uses: actions/upload-artifact@v4
        with:
          name: Linux-artifacts
          path: |
            dist/*.tar.gz
            dist/*.AppImage
            dist/latest-linux.yml
          if-no-files-found: warn
          retention-days: 7

  build-windows:
    name: Build Windows
    if: ${{ github.event.inputs.platform == 'Windows' || github.event.inputs.platform == 'All' }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npm run release:win32

      - uses: actions/upload-artifact@v4
        with:
          name: Windows-artifacts
          path: |
            dist/*.exe
            dist/*.zip
            dist/latest.yml
          if-no-files-found: warn
          retention-days: 7
