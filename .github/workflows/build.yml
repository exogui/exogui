name: Build on demand

on:
  workflow_dispatch:
    inputs:
      platform:
        description: Platform to build
        required: true
        default: macOS
        type: choice
        options:
          - macOS
          - Linux
          - Windows
          - All

permissions:
  contents: read

jobs:
  build-macos:
    name: Build macOS
    if: ${{ github.event.inputs.platform == 'macOS' || github.event.inputs.platform == 'All' }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Disable code signing
        run: |
          printf '#!/bin/sh\nexit 0\n' > /usr/local/bin/codesign
          chmod +x /usr/local/bin/codesign

      - run: npm run release:mac-universal

      - uses: actions/upload-artifact@v4
        with:
          name: macOS-artifacts
          path: |
            dist/*.dmg
            dist/latest-mac.yml
          if-no-files-found: warn
          retention-days: 7

  build-macos-legacy:
    name: Build macOS (Legacy)
    if: ${{ github.event.inputs.platform == 'macOS' || github.event.inputs.platform == 'All' }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Disable code signing
        run: |
          printf '#!/bin/sh\nexit 0\n' > /usr/local/bin/codesign
          chmod +x /usr/local/bin/codesign

      - name: Install Electron v37
        run: npm install electron@37 --save-dev

      - run: npm run release:mac-universal

      - name: Rename artifacts to legacy
        run: |
          for f in dist/exogui-*.dmg; do
            mv "$f" "${f/exogui-/exogui-legacy-}"
          done

      - uses: actions/upload-artifact@v4
        with:
          name: macOS-Legacy-artifacts
          path: dist/*-legacy-*.dmg
          if-no-files-found: warn
          retention-days: 7

  build-linux:
    name: Build Linux
    if: ${{ github.event.inputs.platform == 'Linux' || github.event.inputs.platform == 'All' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npm run release:linux

      - uses: actions/upload-artifact@v4
        with:
          name: Linux-artifacts
          path: |
            dist/*.tar.gz
            dist/*.AppImage
            dist/latest-linux.yml
          if-no-files-found: warn
          retention-days: 7

  build-windows:
    name: Build Windows
    if: ${{ github.event.inputs.platform == 'Windows' || github.event.inputs.platform == 'All' }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npm run release:win32

      - uses: actions/upload-artifact@v4
        with:
          name: Windows-artifacts
          path: |
            dist/*.exe
            dist/*.zip
            dist/latest.yml
          if-no-files-found: warn
          retention-days: 7
