name: Build

on:
  workflow_dispatch:
    inputs:
      platform:
        description: Platform to build
        required: true
        default: macOS
        type: choice
        options:
          - macOS
          - Linux
          - Windows
          - All

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            runner: macos-latest
            script: release:mac-universal
            artifact-pattern: |
              dist/*.dmg
              dist/latest-mac.yml
            enabled: ${{ github.event.inputs.platform == 'macOS' || github.event.inputs.platform == 'All' }}

          - name: Linux
            runner: ubuntu-latest
            script: release:linux
            artifact-pattern: |
              dist/*.tar.gz
              dist/*.AppImage
              dist/latest-linux.yml
            enabled: ${{ github.event.inputs.platform == 'Linux' || github.event.inputs.platform == 'All' }}

          - name: Windows
            runner: windows-latest
            script: release:win32
            artifact-pattern: |
              dist/*.exe
              dist/*.zip
              dist/latest.yml
            enabled: ${{ github.event.inputs.platform == 'Windows' || github.event.inputs.platform == 'All' }}

    steps:
      - uses: actions/checkout@v4
        if: ${{ matrix.enabled == 'true' }}
        with:
          submodules: recursive

      - name: Setup Node.js
        if: ${{ matrix.enabled == 'true' }}
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        if: ${{ matrix.enabled == 'true' }}
        run: npm ci

      - name: Build ${{ matrix.name }}
        if: ${{ matrix.enabled == 'true' }}
        run: npm run ${{ matrix.script }}

      - name: Upload artifacts
        if: ${{ matrix.enabled == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}-artifacts
          path: ${{ matrix.artifact-pattern }}
          if-no-files-found: warn
          retention-days: 7
