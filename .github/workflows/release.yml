name: Release

on:
  pull_request:
    types: [closed]
    branches:
      - master

permissions:
  contents: write

jobs:
  prepare:
    name: Bump Version
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
          token: ${{ secrets.RELEASE_PAT }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Bump patch version
        id: bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          npm version patch --no-git-tag-version
          VERSION=$(node -p "require('./package.json').version")
          git add package.json package-lock.json
          git commit -m "chore: bump version to ${VERSION}"
          git push origin master
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

  sync-develop:
    name: Sync develop with master
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PAT }}

      - name: Merge master into develop
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout develop
          git merge origin/master --ff-only
          git push origin develop

  build:
    name: Build ${{ matrix.name }}
    needs: prepare
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            runner: ubuntu-latest
            script: release:linux
            artifact-pattern: |
              dist/*.tar.gz
              dist/*.AppImage
              dist/latest-linux.yml

          - name: Windows
            runner: windows-latest
            script: release:win32
            artifact-pattern: |
              dist/*.exe
              dist/*.zip
              dist/latest.yml

          - name: macOS (Universal)
            runner: macos-latest
            script: release:mac-universal
            artifact-pattern: |
              dist/*.dmg
              dist/latest-mac.yml

    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build ${{ matrix.name }}
        run: npm run ${{ matrix.script }}

      - name: List dist directory
        shell: bash
        run: ls -la dist/ || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}-artifacts
          path: ${{ matrix.artifact-pattern }}
          if-no-files-found: warn

  build-legacy-mac:
    name: Build macOS (Legacy)
    needs: prepare
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Electron v37
        run: npm install electron@37 --save-dev

      - name: Build macOS (Legacy)
        run: npm run release:mac-universal

      - name: Rename artifacts to legacy
        shell: bash
        run: |
          for f in dist/exogui-*.dmg; do
            mv "$f" "${f/exogui-/exogui-legacy-}"
          done

      - name: List dist directory
        run: ls -la dist/ || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macOS-Legacy-artifacts
          path: dist/*-legacy-*.dmg
          if-no-files-found: warn

  release:
    name: Create Release
    needs: [prepare, build, build-legacy-mac]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R artifacts/

      - name: Generate changelog
        id: git-cliff
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --unreleased --strip all

      - name: Create release notes
        run: |
          echo "$CHANGELOG" > RELEASE_NOTES.md
          cat >> RELEASE_NOTES.md << 'EOF'

          <!-- changelog-end -->

          ## Artifacts
          - Linux: AppImage and tar.gz archive
          - Windows: NSIS installer (.exe) and portable zip archive
          - macOS: Universal (Intel and Apple Silicon) DMG disk image
          - macOS Legacy: Universal DMG built with Electron v37 (for older macOS versions)

          ### Linux Notes
          Run AppImage with: `./exogui.AppImage --no-sandbox`

          ### Windows Notes
          - `.exe` - Full installer with shortcuts and uninstaller
          - `.zip` - Portable version, extract and run (no installation required)
          EOF
        env:
          CHANGELOG: ${{ steps.git-cliff.outputs.content }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.prepare.outputs.version }}
          name: v${{ needs.prepare.outputs.version }}
          draft: false
          prerelease: false
          files: |
            artifacts/**/*
          body_path: RELEASE_NOTES.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
