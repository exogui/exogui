name: Develop Release

on:
  pull_request:
    types: [closed]
    branches:
      - develop

permissions:
  contents: write

jobs:
  prepare:
    name: Set Beta Version
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set beta version
        id: version
        run: |
          BASE=$(node -p "require('./package.json').version.replace(/-.*$/, '')")
          COUNT=$(git tag -l "v${BASE}-beta.*" | wc -l | tr -d ' ')
          VERSION="${BASE}-beta.${COUNT}"
          npm version "${VERSION}" --no-git-tag-version
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

  build:
    name: Build ${{ matrix.name }}
    needs: prepare
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            runner: ubuntu-latest
            script: release:linux
            artifact-pattern: |
              dist/*.tar.gz
              dist/*.AppImage
              dist/beta-linux.yml

          - name: Windows
            runner: windows-latest
            script: release:win32
            artifact-pattern: |
              dist/*.exe
              dist/*.zip
              dist/beta.yml

          - name: macOS (Universal)
            runner: macos-latest
            script: release:mac-universal
            artifact-pattern: |
              dist/*.dmg
              dist/beta-mac.yml

    steps:
      - uses: actions/checkout@v4
        with:
          ref: develop
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Set beta version
        shell: bash
        run: |
          BASE=$(node -p "require('./package.json').version.replace(/-.*$/, '')")
          COUNT=$(git tag -l "v${BASE}-beta.*" | wc -l | tr -d ' ')
          npm version "${BASE}-beta.${COUNT}" --no-git-tag-version

      - name: Build ${{ matrix.name }}
        run: npm run ${{ matrix.script }}

      - name: List dist directory
        shell: bash
        run: ls -la dist/ || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}-artifacts
          path: ${{ matrix.artifact-pattern }}
          if-no-files-found: warn

  release:
    name: Create Beta Release
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: develop
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R artifacts/

      - name: Generate changelog
        id: git-cliff
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --unreleased --strip all

      - name: Create release notes
        run: |
          echo "$CHANGELOG" > RELEASE_NOTES.md
          cat >> RELEASE_NOTES.md << 'EOF'

          <!-- changelog-end -->

          > **Beta release** — may be unstable. Switch to the Stable channel in Config for production use.
          EOF
        env:
          CHANGELOG: ${{ steps.git-cliff.outputs.content }}

      - name: Create Beta Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.prepare.outputs.version }}
          name: v${{ needs.prepare.outputs.version }}
          draft: false
          prerelease: true
          files: |
            artifacts/**/*
          body_path: RELEASE_NOTES.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
